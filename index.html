<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly-Dictionary SPA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"/>
</head>
<body>

    <div class="bg-texture"></div>

    <header class="site-header">
        <div class="logo">
            <span class="logo-w">W</span><span class="logo-rest">ordly</span>
        </div>
        <p class="tagline">Discover words and their meanings.</p>
    </header>

    <main>
        <section class=""search-section>
            <form id="search-form" aria-lable="word search form">
                <div class="input-wrapper">
                    <input
                     type="text"
                     id="word-input"
                     placeholder="search a word"
                     aria-label="Enter a word to search"
                     autocomplete="off"
                     required
                     />
                     <button type="submit" id="search-btn" aria-label="Search">
                        <span class="btn-text">Search</span>
                        <span class="btn-icon">-></span>
                     </button>
                </div>
            </form>
            <div id="error-msg" class="error-msg" role="alert" aria-live="polite"></div>
        </section>

        <section id="results-section" class="results-section" aria-live="polite">
            <div id="loader" class="loader hidden"></div>
            <div id="word-card" class="word-card hidden"></div>
        </section>
    </main>

    <footer class="site-footer">
        <p>Built by TRIZAH</p>
        <p>Powered by<a href="https://dictionaryapi.dev" target="_blank">Free Dictionary API</a></p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
